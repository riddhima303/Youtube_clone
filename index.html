<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Sidebar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
    <div class="logo">
        <i class="fa-brands fa-youtube"></i>
        <span>YouTube</span>
    </div>
    <div class="search-bar">
        <input type="text" placeholder="Search">
        <button>
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>
    <div class="nav-icons">

        <button class="create-btn">
            <i class="fa-solid fa-plus"></i>
            Create
        </button>

        <div class="bell">
            <i class="fa-regular fa-bell"></i>
            <span class="notification">9+</span>
        </div>

        <button class="sign-in">
            <i class="fa-regular fa-user"></i>
            Sign in
        </button>
    </div>
</header>

<div class="container">
<nav class="sidebar">
    <ul>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-bolt"></i>
                <span>Shorts</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-play"></i>
                <span>Subscriptions</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-user"></i>
                <span>You</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-clock"></i>
                <span>History</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-list"></i>
                <span>Playlists</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-bookmark"></i>
                <span>Watch Later</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-thumbs-up"></i>
                <span>Liked Videos</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-download"></i>
                <span>Downloads</span>
            </a>
        </li>

        <li class="menu-item">
            <a href="#">
                <i class="fa-solid fa-compass"></i>
                <span>Explore</span>
            </a>
        </li>

    </ul>
</nav>
 <main class="content">

        <div class="classes">
            <button class="class-btn">All</button>
            <button class="class-btn">Music</button>
            <button class="class-btn">Gaming</button>
            <button class="class-btn">Sports</button>   
            <button class="class-btn">Education</button>    
            <button class="class-btn">Comedy</button>
            <button class="class-btn">Recommended</button>        
            <button class="class-btn">Anime</button>
            <button class="class-btn">Trailers</button>
            <button class="class-btn">Space</button>
            <button class="class-btn">Finance</button>
            <button class="class-btn">Vlogs</button>
            <button class="class-btn">Fashion</button>
            <button class="class-btn">UI/UX</button>   
            <button id="next">></button>
        </div>
    <div class="video-card">
            <div class="thumbnail">
            <iframe 
                src="https://www.youtube.com/embed/G0WsHjfV8zQ?si=HPnL8CMoR2r0F1sF"
                title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen>
            </iframe>
        </div>
    <div class="video-info">
        <h4>Mr Bean - Autocollants de football</h4>
        <p>WildBrain Arène D'action • 1M views • 2 days ago</p>
    </div>

</div> 
    </main>


</div>
</body>
</html>
